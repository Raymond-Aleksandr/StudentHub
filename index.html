<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,300;1,6..72,400;1,6..72,500;1,6..72,600&display=swap" rel="stylesheet" />
    <title>StudentHub - Private Study Planner</title>
    <script>
      (function () {
        var search = window.location.search
        if (!search || search.indexOf('?/') !== 0) return
        var baseUrl = '%BASE_URL%'
        var repoBase = baseUrl === '/' ? '' : baseUrl.replace(/\/$/, '')

        var pathname = search
          .replace(/^\?\//, '/')
          .replace(/&/g, '?')
          .replace(/~and~/g, '&')

        var target = repoBase + pathname + window.location.hash
        window.history.replaceState(null, '', target)
      })()
    </script>
    <style>
      /* Critical CSS - prevent layout shift */
      *, *::before, *::after { box-sizing: border-box; }
      body { 
        margin: 0; 
        padding: 0; 
        background-color: oklch(0.985 0.005 80);
        color: oklch(0.18 0.015 60);
        font-family: Geist, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .navbar { 
        position: fixed; 
        top: 0; 
        left: 0; 
        right: 0; 
        height: 64px; 
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(20px);
        z-index: 100;
      }
      section { scroll-margin-top: 64px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
